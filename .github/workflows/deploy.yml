name: Build and Deploy Full Stack App

on:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend dependencies
        run: npm install

      - name: Run frontend tests
        run: npm test -- --watchAll=false
        continue-on-error: true

      - name: Build frontend
        run: npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy frontend to S3
        run: aws s3 sync build/ s3://${{ secrets.S3_BUCKET_NAME }} --delete

  backend:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest
    needs: frontend

    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t backend-api .

      - name: Deploy backend to EC2 over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/backend

            docker tag backend-api backend-api-backup || true
            docker build -t backend-api-new .

            docker stop backend-api || true
            docker rm backend-api || true

            docker run -d --name backend-api -p 3001:3001 --env-file .env backend-api-new || (
              docker run -d --name backend-api -p 3001:3001 --env-file .env backend-api-backup
            )

            docker image prune -f || true